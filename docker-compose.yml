services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alicepare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-career_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alicepare} -d ${POSTGRES_DB:-career_db}"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-alicepare}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-career_db}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FRANCE_TRAVAIL_CLIENT_ID: ${FRANCE_TRAVAIL_CLIENT_ID:-}
      FRANCE_TRAVAIL_CLIENT_SECRET: ${FRANCE_TRAVAIL_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: src/frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend



volumes:
  pgdata: